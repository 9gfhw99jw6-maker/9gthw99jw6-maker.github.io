<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>System Maintenance</title>
    <style>
        /* コピー・ドラッグの完全禁止 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #00f2ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* グリッド背景 */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(#111 1px, transparent 1px), 
                              linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* スキャンライン */
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.1);
            animation: scan 4s linear infinite;
            z-index: 2;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .content {
            z-index: 3;
            text-align: center;
            padding: 40px;
            border: 1px solid #00f2ff;
            background: rgba(0, 20, 25, 0.8);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status {
            font-size: 0.8rem;
            color: #fff;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="scanline"></div>

    <div class="content">
        <h1>System Offline</h1>
        <div class="status">NOW BUILDING: CORE_INTERFACE_V2.0</div>
        <p>現在、サイト構築のため一時的にアクセスを制限しています。</p>
    </div>

    <script>
        // 右クリック・ショートカットの完全防御
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey) {
                if (['c', 'C', 'u', 'U', 'a', 'A', 's', 'S', 'i', 'I'].includes(e.key)) {
                    e.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
