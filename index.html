<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            z-index: 1;
        }
        .status-code {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #ffffff, #444444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.1;
            margin: 0;
        }
        h1 {
            font-size: 1.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: -2rem 0 1rem 0;
            color: #00d4ff;
        }
        p {
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }
        .line {
            width: 50px;
            height: 2px;
            background: #00d4ff;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-code">503</div>
        <h1>Under Construction</h1>
        <div class="line"></div>
        <p>現在、システムの最適化を行っております。<br>より高性能な体験をお届けするため、もう少々お待ちください。</p>
    </div>
</body>
</html>
